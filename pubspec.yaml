name: foodiespot
description: FoodieSpot - Aplikasi Pencarian Kuliner Terdekat

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP & Storage
  http: ^1.2.1
  shared_preferences: ^2.2.3
  # UI & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  intl: ^0.18.1
  # Maps & Location
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true